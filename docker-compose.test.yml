services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vct
      POSTGRES_PASSWORD: vct_test_pw
      POSTGRES_DB: vctfantasy_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vct -d vctfantasy_test"]
      interval: 3s
      timeout: 3s
      retries: 10
