services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vct
      POSTGRES_PASSWORD: vct_dev_pw
      POSTGRES_DB: vctfantasy
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vct -d vctfantasy"]
      interval: 5s
      timeout: 5s
      retries: 10

  vlrapi:
    build:
      context: ./vlr-scraper
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  db_data:
